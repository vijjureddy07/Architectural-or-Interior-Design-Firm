<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to your Aura Arch portal to review project updates, renderings, and approvals." />
  <title>Login — Aura Arch</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/aura-arch-favicon.svg" />
  <link rel="apple-touch-icon" href="../assets/images/aura-arch-favicon.svg" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
</head>
<body>
  <main class="auth-shell auth-shell--login">
    <section class="auth-shell__frame">
      <section class="auth-card auth-shell__panel hero-load">
        <div class="auth-card__head">
          <a href="../index.html" class="auth-logo">
            <span class="auth-logo__mark" aria-hidden="true"></span>
            <span class="navbar__logo-text">Aura Arch</span>
          </a>
          <div class="auth-card__actions">
            <button class="navbar__icon-btn theme-btn" type="button" aria-label="Toggle dark mode">
              <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/></svg>
            </button>
            <button class="navbar__icon-btn rtl-btn" type="button" aria-label="Toggle RTL">RTL</button>
          </div>
        </div>

        <div class="auth-form-intro">
          <p class="auth-kicker">Sign In</p>
          <h2 class="auth-form-title">Continue with your studio account</h2>
          <p class="auth-form-copy">Open your portal to review deliverables, messages, and active decisions from a single workspace.</p>
        </div>

        <div class="social-stack">
          <button class="social-btn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
          <button class="social-btn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Continue with Apple
          </button>
          <button class="social-btn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#0A66C2" aria-hidden="true"><path d="M4.98 3.5C4.98 4.88 3.86 6 2.49 6S0 4.88 0 3.5 1.12 1 2.49 1s2.49 1.12 2.49 2.5zM.5 8h4V24h-4V8zm7 0h3.83v2.16h.05c.53-1.01 1.83-2.16 3.77-2.16 4.03 0 4.77 2.65 4.77 6.09V24h-4v-7.02c0-1.67-.03-3.82-2.33-3.82-2.33 0-2.69 1.82-2.69 3.7V24h-4V8z"/></svg>
            Continue with LinkedIn
          </button>
        </div>

        <div class="auth-divider">or continue with email</div>

        <form class="auth-form" data-validate onsubmit="window.location='dashboard-user/index.html';return false">
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <input class="form-input" type="email" id="login-email" placeholder="hello@auraarch.com" required />
            <span class="form-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="password-wrap">
              <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required minlength="6" />
              <button class="password-toggle" type="button" data-target="#login-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" aria-live="polite"></span>
          </div>

          <div class="password-row">
            <label for="remember-me">
              <input type="checkbox" id="remember-me" />
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button class="btn btn--primary auth-submit" type="submit">Enter Portal</button>
        </form>

        <p class="auth-foot">Need access? <a href="signup.html">Create an account</a></p>
      </section>
    </section>
  </main>

  <script src="../assets/js/main.js"></script>
</body>
</html>
